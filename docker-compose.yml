services:
  emotion-app:
    build: .
    image: emotion-app-gpu:latest
    container_name: emotion-app
    # Host mode is best for UDP performance; container shares WSL's IP
    network_mode: host
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - .:/workspace
      - ./.nv_cache:/root/.nv
    environment:
      - CUDA_CACHE_PATH=/root/.nv/ComputeCache
      - TF_CPP_MIN_LOG_LEVEL=3
      - PORT=5005
      - DISPLAY=$DISPLAY  # Allows the container to open a GUI window if needed
      # EGL_PLATFORM=device: use NVIDIA EGL for headless GPU (MediaPipe GPU delegate)
      - EGL_PLATFORM=device
      # UDP RTP H264 from Windows GStreamer sender (ksvideosrc → x264enc → rtph264pay → udpsink)
      # Windows sender: gst-launch-1.0 ksvideosrc ! videoconvert ! x264enc tune=zerolatency bitrate=2000 speed-preset=superfast ! rtph264pay ! udpsink host=<WSL2_IP> port=5001
      # Get WSL2 IP with: ip addr show eth0 | grep 'inet ' (run in WSL)
      # gst-launch-1.0 ksvideosrc ! videoconvert ! x264enc tune=zerolatency bitrate=2000 speed-preset=superfast ! rtph264pay config-interval=-1 ! udpsink host=192.168.0.159 port=5001
      - CAMERA_GST_PIPELINE=udpsrc port=5001 ! application/x-rtp,encoding-name=H264,payload=96 ! rtph264depay ! h264parse ! avdec_h264 ! videoconvert ! appsink
      # Ollama LLM (runs on Windows host, reachable via localhost in mirrored WSL2 networking)
      - OLLAMA_BASE_URL=http://localhost:11434
      - OLLAMA_MODEL_NAME=emotion-ai
      # Second camera (optional — dual-camera auto-switching). See docs/camera-input.md
      # Windows sender: gst-launch-1.0 ksvideosrc device-index=1 ! videoconvert ! x264enc tune=zerolatency bitrate=2000 speed-preset=superfast ! rtph264pay config-interval=-1 ! udpsink host=<WSL2_IP> port=5002
      # - CAMERA_GST_PIPELINE_2=udpsrc port=5002 ! application/x-rtp,encoding-name=H264,payload=96 ! rtph264depay ! h264parse ! avdec_h264 ! videoconvert ! appsink
      # - CAMERA_SWITCH_INTERVAL=20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    restart: unless-stopped